<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Toolfox">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
  <!-- background -->
  <rect x="2" y="2" width="60" height="60" rx="13" fill="url(#bg)"/>
  <!-- left ear -->
  <polygon points="13,34 20,10 29,34" fill="#fff" opacity="0.95"/>
  <!-- right ear -->
  <polygon points="35,34 44,10 51,34" fill="#fff" opacity="0.95"/>
  <!-- left ear inner -->
  <polygon points="16.5,32 20,17 25.5,32" fill="#f97316"/>
  <!-- right ear inner -->
  <polygon points="38.5,32 44,17 47.5,32" fill="#f97316"/>
  <!-- face -->
  <ellipse cx="32" cy="40" rx="18" ry="16" fill="#fff" opacity="0.95"/>
  <!-- left eye -->
  <circle cx="25" cy="38" r="2.5" fill="#1c0a00"/>
  <!-- right eye -->
  <circle cx="39" cy="38" r="2.5" fill="#1c0a00"/>
  <!-- muzzle -->
  <ellipse cx="32" cy="47" rx="7" ry="4" fill="#fde8c8"/>
  <!-- nose -->
  <ellipse cx="32" cy="43.5" rx="2.2" ry="1.5" fill="#1c0a00"/>
</svg>
